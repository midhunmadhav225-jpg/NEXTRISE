<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galaxy and Formula 1 | Nextrise Frontier</title>
    <style>
        :root {
            --bg: #050505;
            --accent: #ff4f00;
            --text: #ffffff;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.08);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: system-ui, -apple-system, sans-serif;
            overflow-x: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }

        .container {
            text-align: center;
            padding: 3rem;
            border: 1px solid var(--border);
            background: var(--glass);
            backdrop-filter: blur(12px);
            border-radius: 4px;
            max-width: 600px;
            width: 90%;
        }

        .brand {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.4rem;
            color: var(--accent);
            margin-bottom: 1rem;
            display: block;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 800;
            letter-spacing: -0.02em;
            line-height: 1.1;
            margin-bottom: 1.5rem;
            text-transform: uppercase;
        }

        p {
            font-size: 0.9rem;
            opacity: 0.6;
            letter-spacing: 0.05em;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <div class="container">
        <span class="brand">Nextrise Frontier Ltd</span>
        <h1>Galaxy Formula 1</h1>
        <p>Production Workspace Initialized</p>
    </div>

</body>
</html>
