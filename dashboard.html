<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GALAXY F1 // Telemetry Dashboard</title>
    <style>
        :root {
            --bg: #030303;
            --accent: #00f0ff;
            --accent-dim: rgba(0, 240, 255, 0.15);
            --neon-pink: #ff007f;
            --text-main: #ffffff;
            --text-muted: #888899;
            --panel-bg: rgba(15, 15, 25, 0.7);
            --border: rgba(0, 240, 255, 0.2);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Courier New', Courier, monospace; }

        body {
            background-color: var(--bg);
            background-image: 
                radial-gradient(at 0% 0%, rgba(255, 0, 127, 0.05) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(0, 240, 255, 0.08) 0px, transparent 50%);
            color: var(--text-main);
            min-height: 100vh;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--border);
            padding-bottom: 1rem;
        }

        .logo-section h1 {
            font-size: 1.8rem;
            font-weight: 900;
            letter-spacing: 4px;
            color: var(--text-main);
            text-shadow: 0 0 10px var(--accent-dim);
        }

        .status-badge {
            background: var(--accent-dim);
            border: 1px solid var(--accent);
            color: var(--accent);
            padding: 0.4rem 1rem;
            font-size: 0.8rem;
            border-radius: 4px;
            text-transform: uppercase;
            box-shadow: 0 0 10px rgba(0, 240, 255, 0.2);
            animation: pulse 2s infinite;
        }

        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 1.5rem;
            flex-grow: 1;
        }

        .panel {
            background: var(--panel-bg);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
            backdrop-filter: blur(10px);
            position: relative;
            overflow: hidden;
        }

        .panel::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 4px; height: 100%;
            background: var(--accent);
        }

        .panel-title {
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--text-muted);
            border-bottom: 1px solid rgba(255,255,255,0.05);
            padding-bottom: 0.5rem;
        }

        .telemetry-val {
            font-size: 3rem;
            font-weight: bold;
            color: var(--accent);
            font-family: monospace;
            text-shadow: 0 0 8px rgba(0, 240, 255, 0.4);
        }

        .progress-bar-container {
            background: rgba(255,255,255,0.05);
            height: 10px;
            border-radius: 5px;
            overflow: hidden;
        }

        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--accent), var(--neon-pink));
            width: 78%;
            box-shadow: 0 0 8px var(--accent);
        }

        .button-action {
            background: transparent;
            border: 1px solid var(--accent);
            color: var(--accent);
            padding: 0.8rem;
            text-transform: uppercase;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            margin-top: auto;
        }

        .button-action:hover {
            background: var(--accent);
            color: var(--bg);
            box-shadow: 0 0 15px var(--accent);
        }

        @keyframes pulse {
            0% { opacity: 0.7; }
            50% { opacity: 1; }
            100% { opacity: 0.7; }
        }
    </style>
</head>
<body>

    <header>
        <div class="logo-section">
            <h1>GALAXY FORMULA 1</h1>
            <p style="color: var(--text-muted); font-size: 0.8rem; margin-top: 5px;">NEXTRISE SYSTEM INITIALIZED</p>
        </div>
        <div class="status-badge">SYSTEMS: ONLINE</div>
    </header>

    <main class="dashboard-grid">
        <div class="panel">
            <div class="panel-title">SPEED CALIBRATION</div>
            <div class="telemetry-val" id="speed-val">412 km/h</div>
            <p style="color: var(--text-muted);">ION PROPULSION STAGE 1</p>
            <div class="progress-bar-container">
                <div class="progress-bar" style="width: 89%;"></div>
            </div>
        </div>

        <div class="panel" style="border-color: rgba(255, 0, 127, 0.2);">
            <div class="panel-title" style="color: var(--neon-pink);">REACTOR HEAT</div>
            <div class="telemetry-val" id="heat-val" style="color: var(--neon-pink); text-shadow: 0 0 8px rgba(255, 0, 127, 0.4);">942°C</div>
            <p style="color: var(--text-muted);">STABLE THRESHOLD</p>
            <div class="progress-bar-container">
                <div class="progress-bar" style="width: 68%; background: var(--neon-pink); box-shadow: 0 0 8px var(--neon-pink);"></div>
            </div>
        </div>

        <div class="panel">
            <div class="panel-title">TRACK COORDINATES</div>
            <div style="font-size: 1.2rem; margin: 1rem 0; line-height: 1.6;">
                NEBULA RING-12<br>
                SECTOR: 4-ALPHA<br>
                GRAVITY: 0.45G
            </div>
            <button class="button-action" onclick="engageHyperdrive()">Engage Drive Simulator</button>
        </div>
    </main>

    <script>
        function engageHyperdrive() {
            alert("Hyperdrive simulation sequence initialized! Systems operating at maximum capacity.");
            let speed = document.getElementById('speed-val');
            let heat = document.getElementById('heat-val');
            
            // Fast simulation trigger
            let count = 412;
            let interval = setInterval(() => {
                if(count >= 500) {
                    clearInterval(interval);
                } else {
                    count += 3;
                    speed.innerText = count + " km/h";
                    heat.innerText = (942 + (count - 412) * 2) + "°C";
                }
            }, 50);
        }
    </script>
</body>
</html>
